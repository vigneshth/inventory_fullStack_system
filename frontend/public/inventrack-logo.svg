<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00FF88;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="#0F1419" rx="40"/>
  <!-- Grid boxes -->
  <rect x="40" y="40" width="50" height="50" fill="url(#grad)" rx="6" filter="url(#shadow)" opacity="0.9"/>
  <rect x="100" y="40" width="50" height="50" fill="url(#grad)" rx="6" filter="url(#shadow)" opacity="0.7"/>
  <rect x="40" y="100" width="50" height="50" fill="url(#grad)" rx="6" filter="url(#shadow)" opacity="0.7"/>
  <rect x="100" y="100" width="50" height="50" fill="url(#grad)" rx="6" filter="url(#shadow)" opacity="0.9"/>
  <!-- Checkmark -->
  <text x="100" y="110" font-size="60" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" opacity="0.2">✓</text>
</svg>